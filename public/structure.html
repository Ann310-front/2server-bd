<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastify Server</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Fastify Server</h1>
        <button id="apiButton">Сделать запрос на API</button>
    </div>
    <script>
        document.getElementById('apiButton').addEventListener('click', async () => {
            try {
                const response = await fetch('/api');
                const data = await response.text();
                if (response.ok && data === "Запрос прошел успешно") {
                    console.log(data);
                }
            } catch (error) {
                console.error('Ошибка при запросе:', error);
            }
        });
    </script>
    </body>   
</html>
